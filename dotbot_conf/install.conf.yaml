- defaults:
    link:
      create: true
      force: true
- link:
    ~/.zshrc: zsh/.zshrc
    ~/.zprofile: zsh/.zprofile
    ~/.zsh_aliases: zsh/.zsh_aliases
    ~/.zsh_functions: zsh/.zsh_functions
    ~/.tigrc: .tigrc
    ~/.lazygit: .lazygit
    ~/.tmux.conf: tmux/.tmux.conf
    ~/.tmux: tmux/.tmux
    ~/.config/nvim: nvim
    ~/.config/lsd: lsd
    ~/.config/kitty: kitty
    ~/.config/btop: btop
